<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>설정 — Local Assistant</title>
<script src="i18n.js"></script>
<style>
  :root{
    --bg-deep:#0B0D12;
    --bg-elevated:#151822;
    --bg-sunken:#0F1219;
    --border:#262B3A;
    --accent:#8FA1FF;
    --accent-dim:#5D6BB8;
    --text-primary:#E7E9F0;
    --text-muted:#8A90A6;
    --ok:#6EE7B7;
    --err:#FF8A8A;
    --mono: ui-monospace, 'Cascadia Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
    --sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg-deep); color:var(--text-primary);
    font-family:var(--sans); overflow:hidden;
  }
  #root{ display:flex; flex-direction:column; height:100%; }

  #titlebar{
    -webkit-app-region: drag;
    padding:10px 14px;
    background:var(--bg-elevated);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  #titlebar .title{ font-family:var(--mono); font-size:12px; color:var(--text-muted); }
  #titlebar .title .caret{ color:var(--accent); }
  #titlebar .btns{ -webkit-app-region: no-drag; display:flex; align-items:center; gap:2px; }
  #maximize-btn, #close-btn{
    background:none; border:none; cursor:pointer; color:var(--text-muted);
    padding:4px; border-radius:6px; display:flex; align-items:center;
  }
  #maximize-btn:hover{ color:var(--text-primary); background:rgba(255,255,255,.07); }
  #close-btn:hover{ color:var(--text-primary); background:rgba(255,255,255,.07); }
  #maximize-btn svg, #close-btn svg{ width:14px; height:14px; }

  #body{ flex:1; min-height:0; display:flex; }

  #sidebar{
    width:150px; flex-shrink:0;
    background:var(--bg-sunken); border-right:1px solid var(--border);
    padding:8px; display:flex; flex-direction:column; gap:2px;
    overflow-y:auto;
  }
  .cat-btn{
    text-align:left; background:none; border:none; cursor:pointer;
    color:var(--text-muted); font-family:var(--sans); font-size:12.5px;
    padding:9px 10px; border-radius:8px;
  }
  .cat-btn:hover{ background:rgba(255,255,255,.05); color:var(--text-primary); }
  .cat-btn.active{ background:rgba(143,161,255,.1); color:var(--accent); font-weight:600; }

  #content{ flex:1; min-width:0; overflow-y:auto; padding:16px 18px; }
  .pane{ display:none; flex-direction:column; gap:8px; }
  .pane.active{ display:flex; }
  .pane h2{ margin:0 0 4px; font-size:13px; color:var(--text-primary); }

  label{ font-size:10px; color:var(--text-muted); font-family:var(--mono); }
  input[type="text"]{
    background:var(--bg-deep); border:1px solid var(--border);
    color:var(--text-primary); font-family:var(--mono); font-size:12px;
    padding:7px 9px; border-radius:8px; outline:none; width:100%;
  }
  input[type="text"]:focus{ border-color:var(--accent-dim); }
  select{
    background:var(--bg-deep); border:1px solid var(--border);
    color:var(--text-primary); font-family:var(--sans); font-size:12px;
    padding:7px 9px; border-radius:8px; outline:none; width:100%;
  }
  select:focus{ border-color:var(--accent-dim); }
  textarea{
    background:var(--bg-deep); border:1px solid var(--border);
    color:var(--text-primary); font-family:var(--sans); font-size:12px;
    padding:7px 9px; border-radius:8px; outline:none; width:100%; resize:vertical;
    min-height:60px; line-height:1.45;
  }
  textarea:focus{ border-color:var(--accent-dim); }
  textarea.mono{ font-family:var(--mono); font-size:11px; }

  .workspace-row{ display:flex; gap:6px; }
  .workspace-row input{ flex:1; min-width:0; }
  #pick-workspace{
    background:var(--bg-deep); border:1px solid var(--border); color:var(--text-primary);
    font-family:var(--mono); font-size:11px; padding:7px 10px; border-radius:8px;
    cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  #pick-workspace:hover{ border-color:var(--accent-dim); }

  #tools-list, #mcp-tools-list{ display:flex; flex-direction:column; gap:4px; }
  .tool-row{
    display:flex; align-items:center; gap:8px;
    font-size:11px; padding:6px 8px;
    background:var(--bg-deep); border:1px solid var(--border); border-radius:8px;
  }
  .tool-row .tool-name{
    flex:1; min-width:0; font-family:var(--mono); color:var(--text-primary);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  /* Compact toggle switch — replaces the old checkbox+text-label pair so a
     row full of long MCP tool names (server + tool) doesn't wrap and stretch
     the list tall; the on/off meaning ("사용"/"항상 허용") is a title tooltip
     instead of visible text. */
  .switch{ position:relative; display:inline-flex; flex-shrink:0; cursor:pointer; }
  .switch input{ position:absolute; opacity:0; width:0; height:0; }
  .switch .track{
    position:relative; width:26px; height:15px; border-radius:8px;
    background:var(--bg-sunken); border:1px solid var(--border);
    transition:background .15s, border-color .15s;
  }
  .switch .track::after{
    content:''; position:absolute; top:2px; left:2px; width:11px; height:11px;
    border-radius:50%; background:var(--text-muted);
    transition:transform .15s, background .15s;
  }
  .switch input:checked + .track{ background:rgba(143,161,255,.22); border-color:var(--accent-dim); }
  .switch input:checked + .track::after{ transform:translateX(11px); background:var(--accent); }
  .switch input:disabled + .track{ opacity:.4; cursor:default; }
  .switch input:focus-visible + .track{ outline:1px solid var(--accent-dim); outline-offset:1px; }

  /* MCP tools grouped per server (searxng, google-calendar, ...) instead of
     one flat list, so each server's own tools nest under it and can be
     collapsed — the group that was getting long with many servers. */
  #mcp-tools-list{ gap:6px; }
  .mcp-server-group{ display:flex; flex-direction:column; gap:4px; }
  .mcp-server-header{
    display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;
    padding:6px 8px; background:var(--bg-sunken); border:1px solid var(--border); border-radius:8px;
  }
  .mcp-server-header .caret{ color:var(--accent); display:inline-block; transition:transform .15s; font-size:10px; }
  .mcp-server-group.open .mcp-server-header .caret{ transform:rotate(90deg); }
  .mcp-server-header .server-name{ flex:1; min-width:0; font-size:11.5px; font-weight:600; color:var(--text-primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mcp-server-header .count{ font-size:10px; font-family:var(--mono); color:var(--text-muted); }
  .mcp-server-tools{ display:none; flex-direction:column; gap:4px; padding-left:14px; }
  .mcp-server-group.open .mcp-server-tools{ display:flex; }
  .mcp-server-group.connecting .mcp-server-header{ cursor:default; }
  .mcp-server-group.connecting .server-name{ color:var(--text-muted); }
  .mcp-server-group.connecting .count{ color:var(--accent); animation:mcp-connecting 1.4s ease-in-out infinite; }
  @keyframes mcp-connecting{ 0%,100%{ opacity:1; } 50%{ opacity:.4; } }

  #mcp-error{ font-size:10.5px; color:var(--err); font-family:var(--mono); white-space:pre-wrap; }
  #mcp-status{ display:flex; flex-direction:column; gap:3px; }
  .mcp-status-row{ font-size:10.5px; font-family:var(--mono); white-space:pre-wrap; word-break:break-word; }
  .mcp-status-row.ok{ color:var(--ok); }
  .mcp-status-row.err{ color:var(--err); }

  #presets-list{ display:flex; flex-direction:column; gap:8px; }
  .preset-row{
    background:var(--bg-deep); border:1px solid var(--border); border-radius:8px;
    padding:8px; display:flex; flex-direction:column; gap:6px;
  }
  .preset-row-head{ display:flex; align-items:center; gap:6px; }
  .preset-row-head .preset-name{ flex:1; min-width:0; }
  .preset-row .del-preset{
    flex-shrink:0; color:var(--text-muted); background:none; border:none;
    cursor:pointer; padding:4px; border-radius:6px; display:flex; align-items:center;
  }
  .preset-row .del-preset:hover{ color:var(--err); background:rgba(255,255,255,.07); }
  .preset-row .del-preset svg{ width:13px; height:13px; }
  .preset-row .preset-prompt{ min-height:44px; }
  .preset-empty{ font-size:11px; color:var(--text-muted); padding:2px 0; }
  .preset-add-row{ display:flex; gap:6px; }
  .preset-add-row input{ flex:1; min-width:0; }
  #add-preset-btn{
    background:var(--accent); color:#0B0D12; border:none; font-size:11px; font-weight:600;
    padding:7px 12px; border-radius:7px; cursor:pointer; white-space:nowrap;
  }

  #footer{
    flex-shrink:0; padding:10px 14px; border-top:1px solid var(--border);
    background:var(--bg-elevated); display:flex; align-items:center; justify-content:flex-end; gap:8px;
  }
  #save-status{ font-size:11px; color:var(--text-muted); font-family:var(--mono); margin-right:auto; }
  #save-settings{
    background:var(--accent); color:#0B0D12;
    border:none; font-size:11px; font-weight:600; padding:7px 14px;
    border-radius:7px; cursor:pointer;
  }
  #save-settings:disabled{ opacity:.6; cursor:default; }
</style>
</head>
<body data-i18n-title-key="settingsWindowTitle">
<div id="root">
  <div id="titlebar">
    <div class="title"><span class="caret">›</span> <span data-i18n="settingsHeaderTitle"></span></div>
    <div class="btns">
      <button id="maximize-btn" data-i18n-title="maximize">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
      </button>
      <button id="close-btn" data-i18n-title="close">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <button class="cat-btn" data-cat="general" data-i18n="catGeneral"></button>
      <button class="cat-btn" data-cat="system" data-i18n="catSystem"></button>
      <button class="cat-btn" data-cat="workspace" data-i18n="catWorkspace"></button>
      <button class="cat-btn" data-cat="mcp" data-i18n="catMcp"></button>
    </div>

    <div id="content">
      <div class="pane" data-cat="general">
        <h2 data-i18n="paneGeneralH2"></h2>
        <label for="base-url" data-i18n="labelBaseUrl"></label>
        <input id="base-url" type="text" placeholder="http://127.0.0.1:8080/v1" spellcheck="false">
        <label for="model-name" data-i18n="labelModel"></label>
        <input id="model-name" type="text" placeholder="local" spellcheck="false">
        <label for="max-tokens" data-i18n="labelMaxTokens"></label>
        <input id="max-tokens" type="text" inputmode="numeric" placeholder="1024" spellcheck="false">
        <label for="max-tool-rounds" data-i18n="labelMaxToolRounds"></label>
        <input id="max-tool-rounds" type="text" inputmode="numeric" placeholder="6" spellcheck="false">
        <label for="language" data-i18n="labelLanguage"></label>
        <select id="language">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="pane" data-cat="system">
        <h2 data-i18n="paneSystemH2"></h2>
        <label for="system-prompt" data-i18n="labelSystemPrompt"></label>
        <textarea id="system-prompt" rows="6" data-i18n-placeholder="placeholderSystemPrompt" spellcheck="false"></textarea>

        <label data-i18n="labelPresets"></label>
        <div id="presets-list"></div>
        <div class="preset-add-row">
          <input id="new-preset-name" type="text" data-i18n-placeholder="placeholderNewPreset" spellcheck="false">
          <button id="add-preset-btn" type="button" data-i18n="btnAddPreset"></button>
        </div>
      </div>

      <div class="pane" data-cat="workspace">
        <h2 data-i18n="paneWorkspaceH2"></h2>
        <label for="workspace-path" data-i18n="labelWorkspace"></label>
        <div class="workspace-row">
          <input id="workspace-path" type="text" data-i18n-placeholder="placeholderWorkspace" readonly spellcheck="false">
          <button id="pick-workspace" type="button" data-i18n="btnBrowse"></button>
        </div>
        <label data-i18n="labelTools"></label>
        <div id="tools-list"></div>
      </div>

      <div class="pane" data-cat="mcp">
        <h2 data-i18n="paneMcpH2"></h2>
        <label for="mcp-servers" data-i18n="labelMcpServers"></label>
        <textarea id="mcp-servers" rows="7" class="mono" placeholder='{"server-name": {"command": "npx", "args": ["-y", "pkg"]}}' spellcheck="false"></textarea>
        <div id="mcp-error"></div>
        <div id="mcp-status"></div>
        <label data-i18n="labelMcpTools"></label>
        <div id="mcp-tools-list"></div>
      </div>
    </div>
  </div>

  <div id="footer">
    <span id="save-status"></span>
    <button id="save-settings" data-i18n="footerSave"></button>
  </div>
</div>
<script src="settings.js"></script>
</body>
</html>
